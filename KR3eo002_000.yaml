front:
  text: 序纂述家至今日稱極盛矣緗帙縹囊鴻纖畢備凡其美而傳傳而久莫不以適於用之為貴若如養生家言意主頤性全真粗之則卻疾延年使人人各得安其壽命以返一世於隆古宜為有用之尤者顧其書至今實少善本緒言流傳若存若昧論者未涉其涯輒概屏為外道以為山林獨善之士或有取焉而不知為日用飲食間盡人可行斯豈非纂録者猶有缺陷而仁壽之化終當有待而興者歟不佞自庚寅秋祝釐來京次年為慈寧大慶得與匝海臚歡共依日月之光時則豫章徐鳴峰先生以補選銓曹同集敘其始則與不佞嘗並時典校有寅僚之誼過從加密鳴峰蓋今之有道而文者平生著作等身所刻詩法吏治二書行海內於學無所不通而雅性淵沖寓物而不留物獨於不佞情親其蘊致已可概見嘗為題其小照四幅顏以齒德同增四字且約他年更續佳話已而出所輯壽世傳真一冊見視囑為敘其首簡余既喜其成書之意與鄙見適合又嘉鳴峰真能以壽身者壽世其言尤信而有徵也嘗謂著書者意苟近名往往獵取艱深示不可測況如服食煉養家談空說渺象罔都迷學者置而不視河漢其言誠無足怪今視此編於頤性全真之道卻疾延年之方莫不擷其菁華導以窾要明白簡易本末具該不出布帛菽粟之談盡力日用行習之事學者誠手一編知所從來將人不必仕與隱地不必喧與寂隨時隨處儘可用功進之可觀九仞之成退亦不失一溉之效洵乎度世之津梁衛生之寶筏也鳴峰在學校為賢師儒在民社為良父母今以需次暇晷不忘著述一本其念切民物善與人同之願以助成我國家太和翔洽之休將人遊化宇世盡春臺有不在茲者乎爰不辭衰朽鈍眊欣然泚筆而為之序乾隆三十有六年辛卯歲嘉平月欽賜國子監司業香山老人年家舊寅弟王世芳拜撰時年一百一十三歲
