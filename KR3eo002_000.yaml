由於暑故治瘧之藥宜露一宿服宜止煩清心雪水性冷宜解疫去酒熱消痧扉洗目退赤冰水性冷宜去煩熱解暑毒酒毒忌多食寒熱相激成脾疾海水性溫宜去風瘙消食脹江河水性平宜煎通二便藥急流者性速而達下回流者性逆而倒上泉水性寒宜解熱悶煩渴溫泉水性熱下有硫硤宜治疥癬井水性平山泉者上城市者下清晨初汲為井華水宜治熱解煩地漿水性寒掘地作坑用新汲水攪濁待澄取用宜治中暑暍陰陽水性平生熟各半宜治上吐下瀉倉卒霍亂揚勞水性速用勺揚起千遍又名甘瀾水宜通二便百沸水性溫滾水久沸宜主發散助陽氣屋漏水性寒忌有毒不可用花瓶水性熱忌有毒不可飲鹽滷水性熱有毒熬鹽初熱槽中滴下黑水忌有大毒鹼水性溫澀取蒿蓼等草用水浸過曬乾燒灰以所浸之水淋汁入白麵凝結成鹼宜消食磨積洗衣去垢忌多用損腸胃米泔水性甘平宜常飲調和脾胃浸洗藥良甑氣水性涼宜洗面上口唇爛瘡飯湯水性溫宜調中開胃理臟腑茶性微寒新茶性熱陳茶性涼宜除煩止渴消食下氣解食物油膩燒炙之毒濃煎引吐和生薑煎名薑茶飲茶助陰姜助陽使寒熱平治小傷風寒可常用忌多食寒胃消臟腑脂膏嗜茶麵黃寒傷胃也酒後飲茶引入腎經膀胱多患瘕疝水腫空心早起亦忌本草拾遺云飲茶能消食除痰止煩去膩然過飲則傷脾胃每食後以濃茶漱口煩膩既去脾胃不損且食物之在齒間者得茶漱滌之盡消縮脫去不煩刺剔而齒亦因此堅密孩兒茶性澀出南番以細茶末入竹筒埋土中日久取出搗汁熬成塊宜清熱收濕止血化痰生津塗肌定毒疼酒性熱味辣者能散味苦者能降味甜者能和味淡者利小便味厚者性烈毒最宜溫服宜少飲有益宜和血行氣壯神禦寒消愁卻邪逐穢暖水能通行一身之表引藥至極高之分此少飲之益忌熱飲傷肺冷飲傷脾多飲傷胃成蠱膈動火致吐血消渴積濕生痰氣足病蓄熱生癰疽及成痔漏為害無窮至喪命不可救藥燒酒性大熱宜浸藥飲貼湯火傷不宜多飲熱飲高粱酒性平即稷米酒和中止泄治腹疾良粟米酒性寒胃熱稍渴者飲之良泄瀉者不宜飲戒酒語陳宗泗曰斟於杯中者酒也吸於口入於喉則流毒無窮傷臟壞腑亂性昏神失事廢時生嫌惹厭助狂徒之氣發鈍夫之言致無形之疾損有限之年內受種種暗傷外現般般醜態本能者縱而不節不能者效而強貪習慣難移悔而莫及今為改酒之名謂之禍水麻油性熱宜解毒潤腸調瘡毒藥良忌生食滑腸胃菜油性熱生則熱煎則寒茶油性平宜醃小菜豆油性熱氣膻宜潤腸忌多食反困脾桐油性冷宜熬膏藥解熱毒忌誤食大作泄瀉用陳柿餅煎水即解鹽性寒人心火盛笑不止似瘋者用鹽煅赤煎水飲之即止宜清火解毒固齒善入而軟堅忌多食傷肺發咳傷腎發渴助水腫損容顏泄胃中津液過食鹹味必口乾可知醋性溫能斂宜消食解毒開胃令人思食治口舌熱瘡含漱即愈忌多食損齒悴顏傷筋因收縮太過也醬性微寒以豆造陳久者良宜除熱及湯火毒殺一切魚肉菜毒忌多食助濕損精因鹹入腎也患瘡癤愈後勿食防疤黑糟性熱陳者性平宜消食化滯忌有痰火病者勿食紅曲性溫宜消食活血芥辣性溫宜入肺發汗散寒利氣豁痰敷癰毒消腫止痛忌久嗽肺虛者勿食茴香性熱如麥大者為小茴有稜瓣者為大茴宜和中益腎暖丹田最利下部忌多食發瘡因香辛故也花椒性熱純陽秦産者名秦椒蜀産者名川椒椒之子名椒目宜入肺發汗散寒治咳嗽入脾暖胃燥濕消食除脹除心腹冷痛治陽衰溲數陰汗補腎堅齒明目通經殺癆蟲安蛔蟲忌肺胃熱者不宜多食椒目宜治水蠱腎虛耳鳴胡椒性熱久蒸久曬可用暖胃宜暖胃快膈治寒痰冷痢胃寒吐水忌多食損肺走氣痛齒昏目動火發瘡發痔此言生椒紅椒性熱色紅如珊瑚有長而尖者有短而圓者又名海椒宜入大腸解毒切細和醬及豬油炒作菜料治各痔瘡神效忌生食多食致齒痛唇腫烟草性熱宜散食脹風寒濕痹消滯氣停痰解山嵐瘴氣忌多食火氣熏灼耗精損神此烟草自明萬曆年間始出於閩廣其相習食煙之始以徵滇之役師入瘴地無不染病獨有一營無恙因衆皆食煙故也性屬純陽其氣強猛故下咽即醉雖散瘴邪亦耗正氣凡火盛氣虛之人決不可用食煙醉悶者噙冷水可解或紅白砂糖亦解戒烟語汪三儂曰近日尚吃煙豫每語人曰為何以火燒五臟請看吃煙之管其中垢膩積滿人之腹內亦必如此其何以堪有人聞豫言忽猛醒誓戒不用初甚決絶少焉憶及便開戒矣豫曰病酒而禁酒之夫破戒不待終朝難産而畏産之婦好合何須滿月嗜煙之癖甚於酒色惑溺殊可怪也齊戒語人能齊戒本是好念何可盡非然須問其發念果屬何為若只為畜類惜生為福利求佑為媚悅佞佛此三者皆可不必也何也如謂物與己同類不宜宰食則六畜原為人用聖王立政令畜五雞二彘者為何也且卿大夫食肉祠先者血食奉親者有酒肉豈皆不仁不慈之事也如謂福利於己由此可求世間善食甚多積善必有餘慶其他善事可以不為而獨借持齊冀必獲福有是理乎至謂以慈佞佛媚而悅之夫慈本仁德仁者人也當以愛人為先論愛人泛而同類近而親友至切而家庭皆在當愛今人於一體人類漠不相關獨區區惜此畜類何慈之有而謂為佛者不論真慈假慈惟佑持齊之人以為媚己恐無是佛矣夫所謂齊者在明潔其心內外兼持一為虔修祀事當奉祭祖先神明齊明盛服飲食必改常以昭敬也一為抑制嗜欲口之於味為嗜欲之首人所最難饜足者而昏志氣生疾病皆原於此所謂禍從口出病從口入者是也能齊則滋味淡泊氣血不強悍主宰清明肉軀皆得其職矣一為扶助德行凡人見善不能決從見惡不能決去一念堅持其齊捐所甚愛就所不愛以此潔誠增長善念愈積善功此皆奉齊者之所為不緣畜類不緣福利不緣媚悅內外兼持克己正志人能克己方許持齊不然徒成癡妄之人而已矣修養宜堤防疾病第七夫人果能順六氣之和平七情之戾使疢疾不作豈不甚善然疾者至聖之所慎惟明哲之人不治已病治未病既病而需醫藥猶臨渴而掘井泉鮮有能濟者況良醫難逢真藥莫辨嘗見死於病者十之三死於醫者十之七蓋醫之一道須上知天文下知地理中知人事三者俱明然後可以語人之疾病不然則如無目夜遊無足晝躡動致顛仆而欲愈人之疾者未之有也至藥之為用或道地不真美惡迥別或市肆多僞氣味全乖非惟不能中病反致病增用者不察嘗試漫施則下咽不返死生立判顧不大可懼耶所以有服藥者之多斃不藥者之反存歲庚寅豫補選都門適同宗前輩某亦候補郡守僑寓憫忠寺抱疴二年堅忍不服藥惟調息飲食起居病無減退亦未加劇會密友某至京詣憫忠寺視疾力薦良醫一人極稱其治病如神前輩某因慫恿難卻強就診治密友代為購藥意倍殷勤且決其旦夕奏效前輩佯諾之藥雖煎未沾唇也越日密友亦病並非沉疴即所薦之良醫藥之前輩日使家僕問訊蓋答其前意之殷勤也甫數日僕忽返告曰密友某死矣前輩惋嘆不已未幾已病全愈得補官出都矣又族叔陶村公宰來陽長子嬰風寒疾諸醫治莫效訪求一良醫進藥數劑病轉甚勢危篤醫來病者堅拒之醫大言嚷曰藥力不勝病如再服無效豫甘罪罰族叔且疑且信強其子下咽無何痰起而氣旋絶矣急索良醫已逃竄無蹤噫可畏哉舉書籍所傳庸醫殺人不可殫述此則豫所耳而目之者或者曰然則醫藥固可廢乎曰何可廢也慎之已爾慎醫藥莫如慎疾病慎疾病尤宜知疾病今為就一身五臟受病之因辨病之誤免病之訣分類指示據病之種類數百止就所常見而易構者摘録之俾於未病之先知所謹懼庶幾不借神樓而普登春臺也按東垣格致餘論序謂故方新病安有能相值者泥之且殺人此編中載病不載方即此意也心臟形如未開蓮蕊中有七孔三毛位居背脊第五椎各臟皆有系附於心屬火旺於夏四五月色主赤苦味入心外通竅於舌出汁液為汗在七情主憂樂在身主血與脈所藏者神所惡者熱面色赤者心熱也好食苦者心不足也怔忡善忘者心虛也心有病舌焦苦喉干不知五味無故煩躁口生瘡作臭手心足心熱肝臟形如懸瓠有七葉左三右四位居背脊第九椎乃背中間脊骨第九節也屬木旺於春正二月色主青酸味入肝外通竅於目出汁液為淚在七情主怒在身主筋與爪所統者血所藏者魂所惡者風肝有病眼生蒙翳兩眼角赤癢流冷淚眼下青轉筋昏睡善恐如人將捕之面色青者肝盛也好食酸者肝不足也多怯者肝虛也多怒者肝實也脾臟形如鐮刀附於胃運動磨消胃內之水穀屬土旺於四季月色主黃甘味入脾外通竅於口出汁液為涎在七情主思慮在身主肌肉所藏者志所惡者濕面色黃者脾弱也好食甜者脾不足也脾有病口淡不思食多涎肌肉消瘦肺臟形如懸磬六葉兩耳共八葉上有氣管通至喉間位居極上附背脊第三椎為五臟之華蓋屬金旺於秋七八月色主白辛味入肺外通竅於鼻出汁液為涕在七情主喜在身主皮毛所統者氣所藏者魄所惡者寒面色淡白無血色者肺枯也右頰赤者肺熱也氣短者肺虛也背心畏寒者肺有邪也肺有病咳嗽氣逆鼻塞不知香臭多流清涕皮膚燥癢腎臟形如刀豆有兩枚一左一右右為命門乃男子藏精女子系胞處也位居下背脊第十四椎對臍附腰屬水旺於冬十十一月色主黑鹹味入腎外通竅於耳出汁液為津唾在七情主欲在身主骨與齒所藏者精所惡者燥面色黑悴者腎竭也齒動而疼者腎炎也耳閉耳鳴者腎虛也目睛內瞳子昏者腎虧也陽事痿而不舉者腎弱也腎有病腰中痛膝冷腳疼或痹蹲起發昏體重骨酸臍下動風牽動腰低屈難伸養生以保脾胃為主人以水穀為生故脾胃為養生之本故東垣脾胃論曰歷觀內經諸篇而參考之則元氣之充足皆由胃氣無所傷而後能滋養元氣一有所傷而元氣亦不能充此諸病之所由生也即如臟腑脈候無不皆有胃氣胃氣若失便是凶候如凡氣短氣奪而聲啞喘急者此肺臟之胃氣敗也神魂失守昏昧日甚而畏寒異常者此心臟之胃氣敗也躁擾煩劇囊縮莖強而恐懼無已者此肝膽之胃氣敗也脹滿不能運飲食不能入肉脫痰壅而服藥不應者此脾臟之胃氣敗也關門不能禁水泉不能化熱蒸不能退骨痛之極不能解者此腎臟之胃氣敗也胃強則皆強胃弱則皆弱有胃氣則生無胃氣則死所以察病者必須先察胃氣凡治病者必須常顧胃氣胃氣無損諸可無慮繆仲淳經疏曰脾為土臟胃為之腑乃後天元氣之所自出胃主納脾主消脾虧則不能消胃弱則不能納飲食少則後天元氣無自而生精血坐是不足也經曰損其脾者調其飲食節其起居適其寒溫此至論也然其要一在戒暴怒使肝無不平之氣肝木和則不賊脾土矣一在養真火命門者火臟也乃先天元氣之所寄即道家所謂祖氣醫家所謂真陽氣真相火也此真陽真火每當子後一陽生生即上升過中焦經脾胃則能腐熟水穀蒸糟粕而化精微脾氣散精上輸於肺通調水道由膀胱氣化而出是謂清升濁降此無病之常也常人之壯者有三一者稟賦原厚二者保嗇精神不妄喪失三者志氣無所拂鬱則年雖邁而猶壯也苟不慎攝生之道多欲以傷腎子後一陽不以時生不能上升腐化水穀是火不生土而脾胃因之日弱也又曰脾胃由寒濕生痰或飲啖過度好食油麵豬脂濃厚膠固以致脾氣不利壅滯為患或不思食或腹脹泄瀉皆痰所為又曰脾虛漸成脹滿夜劇晝靜病屬陰當補脾陰夜靜晝劇病屬陽當益脾氣經脈篇曰胃中寒則脹滿陳無擇曰脾虛多病濕內因酒面積多過飲湯液停滯膩物燒炙膏粱過度修養宜護持藥物第八上古天真論曰男子年過八八六十四數先天漸失元氣寢虛臟腑皆衰筋骨弛懈血脈短促精神耗散肌肉無華日就憔悴惟借藥餌扶護以培後天語云破屋修容易此之謂也古聖先哲嘗草以備藥治人百病復遺方書以利後世誠以醫藥有斡旋造化之功無如服餌者守身不慎致六氣外侵七情內熾飲食衆毒暗攻雖日進參朮猶之用兵者鋭師臨陳強寇勢盛寡不敵衆無效則謂參朮無功置而勿論非自貽伊戚乎方書所載補益之劑甚多或真材無處可求或大藥乏資難購又或鋪張靈應名實不符今惟取平易而素嘗歷驗者略載數方以備採擇既自寶以護身兼廣傳而壽世前云慎醫藥戒漫嘗者以病時言也此云備藥物謹護持者以平時言也長春至寶丹服此丹能健脾開胃進食止瀉強筋壯骨填精補髓活血助陽潤澤肌膚調和五臟延年益壽返老還童凡人六十以後急需接助以救殘衰服此丹至老無痿弱之症鹿角膠四兩牡蠣粉炒成珠熟地八兩枸杞子四兩酒蒸當歸四兩酒蒸破故紙四兩牛膝四兩酒洗巨勝子四兩炒巴戟四兩酒浸肉蓯蓉酒洗去鱗甲六兩杜仲薑汁炒去絲四兩哺退雞蛋殼七個炙黃研鱉頭五兩蜜酥炙黑驢腎一條切片酒煨杵爛瑣陽四兩酥炙黃狗腎三條酒煨杵爛人參鴿子蛋三十六個煮熟入藥先將衆藥磨成細末將二腎鴿蛋搗爛入藥拌勻蜜丸石臼杵千餘下做成桐子大每服三錢老年常服精力不衰方白蜜二斤公豬膄子油四兩核桃二斤雞蛋二十個先將蜜熬好豬油切爛放下又將桃肉用水泡去皮搗碎放下復將蛋打開放下滾好隨將大碗盛貯早晚或湯或滾水化開任服八仙糕治無病久病老病脾胃虛弱精神短少等症人參山藥六兩蓮肉六兩芡實六兩茯苓六兩糯米七升早粳米七升白糖霜二兩五錢上將山藥參蓮芡苓五味各為細末再將粳糯米為粉與上藥末和勻並白糖入蜜湯中燉化攤鋪籠內切成條蒸熟火上烘乾收好飢時用白湯泡數條服舒脾寬胃功難筆述回春烏龍丸此祕方服之體健身輕耳聰目明烏須黑髮齒落更生陽事強壯丹田如火百病消除烏龍一付全用即烏犬骨連頭至尾脊骨一條不用水洗用黃酒浸一宿用硼砂五錢和奶酥油搽骨上火炙黃色為度稱骨二十四兩足犬須一周年者佳如走去陽者不效一犬不足用二犬骨務稱足分兩胡桃仁五錢去皮炒黃巴戟酒浸去骨一兩石蓮子去殼一兩棗仁炒一兩遠志甘草水浸酒炒一兩肉蓯蓉酒洗去鱗甲三兩石斛要金叉者二兩桑寄生二兩大茴香一兩酒炒故紙二兩酒炒石菖蒲一兩芡實炒一兩蓮鬚一兩鹿茸一對炙酥上藥共末用黃酒打糊為丸桐子大每服空腹酒下牛骨髓膏此膏專補虛損活血榮筋潤澤肌膚返老轉童牛髓一斤煉過白蜜一斤和在一處瓷罐收貯另用炒熟麥面每面三匙用髓蜜二匙拌勻滾水或酒沖服脂桃膏取木火相生補骨脂十兩揀淨黃酒浸一夕蒸熟曬乾為末又名破故紙胡桃肉二十兩溫水泡去皮搗如泥蜂蜜一斤白者更佳先將蜂蜜入鍋內煎一二滾即以前二味入蜜內攪勻收入瓷罐內每飯前空心酒調一盞服如不飲酒用滾水亦可忌蕓薹油菜補骨脂屬火堅固元陽暖丹田入命門補相火腎虛則命門火衰不能熏蒸致脾胃虛寒遲於運化飲食減少故補命門相火即是補脾胃也胡桃肉屬木溫肺化痰補氣養血通命門助腎火合故紙有木火相生之妙能使精氣內充昔鄭相國生平不服他藥只此一方久服後容顏如少鬚髮轉黑牛乳膏牛乳二斤淮山藥一斤研成粉杏仁一斤滾水泡去皮尖先將山藥杏仁細研成粉拌入牛乳用新瓷罐封固久煮每日空心酒調服牛乳補虛勞山藥白入肺甘入脾補其不足又益腎強陰益心氣治健忘化痰止遺精瀉痢杏仁除風散寒順氣行痰潤燥消積蓮薏粥白蓮肉去皮心一兩薏苡仁一兩白米一合蓮肉澀精厚腸除脾泄薏苡仁健脾去濕補肺清熱治腳氣療筋急白米粥暢胃氣生精液除煩清熱黃耆湯黃耆烏雞骨肉毛俱黑者良黃耆補氣固表實腠理炙用補中益元氣生血烏雞屬水余皆屬木故動風補虛溫中益肝腎男用雌延年益壽膏能烏須延年填精補髓陰虛陽弱無子者服至半年即有子神效赤白何首烏各一斤黑豆拌蒸曬赤白茯苓各一斤人乳拌蒸曬懷山藥四兩薑汁拌炒川牛膝酒炒八兩菟絲子八兩酒炒甘枸杞八兩杜仲去皮薑汁炒八兩破故紙四兩黑芝麻拌炒去麻不用煉蜜丸梧子大每服七十丸鹽湯或酒任下加味安神丸主安神益志治心虛血少觸事多驚及健忘不寐服之神氣自足當歸身酒炒二兩熟地黃二兩茯神一兩五錢遠志肉一兩泡去心炒酸棗仁一兩炙黃耆二兩人參柏子仁一兩五錢上桂五錢白芍藥一兩炒北五味五錢小橘紅一兩粉甘草五錢蜜丸每服三錢滾水下加減資生丸治脾氣怯弱食後反飽杭白朮漂薏苡仁炒淮山藥蒸白扁豆炒各二兩北桔梗一兩白茯苓蒸白豆蔻去殼煨炒吳曲大麥芽炒香附米西砂仁去殼淨芡實炒廣橘皮各一兩白蓮肉去心四兩粉甘草一兩研末煉蜜丸每服五錢闢寒丹雄黃赤石脂黏香者佳乾薑上各等分為末用蜜同白松香末為丸如梧子大酒送下四丸至服十丸止可不衣棉赤身入水闢暑丹雌黃研水飛白石脂水飛丹砂研細黃泥裹燒如粉磁石水飛去赤各等分人乳同白松香為丸如小豆空心白湯送下四丸服至三兩許夏月衣裘褐暑氣亦不侵入二方乃仙傳頗有神驗也黑髮烏須方黑豆五升揀去扁破用一大砂鍋將烏骨老母雞一隻煮湯二大碗無灰老酒二大碗何首烏四兩鮮者用竹刀削碎陳者用木槌打碎陳米四兩旱蓮草四兩桑椹三兩生地黃四兩歸身四兩破故紙二兩俱為㕮咀拌豆以酒湯為水砂鍋大作一料砂鍋小作二料用文火煮豆以干為度去藥存豆取出晾去熱氣以瓷罐盛之空心用淡鹽湯食一小合以其曾用雞湯煮過早晚宜慎於蓋藏以防蜈蚣也食完再製但自此永不可食蘿蔔服至半載鬚髮從內黑出目明如少極妙
