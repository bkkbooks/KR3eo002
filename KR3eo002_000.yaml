body:
  text: 總述程伊川曰世間有三件事可由人力為國而至於祈天永命養形而至於卻疾延年為學而至於希賢希聖此三事分明人力可以勝造化只是人不為耳真言曰凡人著不得力者身外之事也著得力者身內之事也著力身外之事都無益著力身內可以延年益壽又曰雖少年致損氣弱體枯若晚年得悟防患補益血氣有增而神足身泰可以永年又曰人年紀一老則百節病生四體皆患即此便是苦獄平日若肯趁早用功便可免此苦獄奈何明知而故不為豈不可憫又曰分明一條好活路如何不走又曰悠悠肉食之徒日為五賊所擾茫不知怪天下不乏自命大丈夫逞掀天揭地之才侈高談闊論之技事事伊周言言孔孟究之大限一到不免與微塵片影消滅無蹤可悲可嘆愚謂箕疇五福以壽為先以考終正命為全方幸生逢盛世翔洽太和海宇承平室家保聚既無擾攘憂戚之患又無凶荒夭扎之傷宜化日舒長咸登壽域而猶或不盡其天年謂非自戕厥生罔識衛生之術歟此修養所宜亟講也修養宜行外功第一外功有按摩導引之決所以行血氣利關節辟邪外干使惡氣不得入吾身中耳語云戶樞不蠹流水不腐人之形體亦猶是也故延年卻病以按摩導引為先此訣傳自先哲至平至易非他奇技異術可比即大聖所謂血氣有未定方剛既衰之時此則預保其衰固守身之要道之是道人人皆能而人不皆行者其故有三一則倚恃壯盛疾苦未形雖勸導之而亦不肯行一則經營職業竭蹶不遑雖欣慕之而又不遐行一則體氣衰憊舉動維艱雖追悔之而卒不及行人果堅其信心策其懈志一意念及此身宜保防患未然如飢之需食寒之求衣未有不得飽且暖者即謂年壽各有定數亦當圖正命考終與其疾痛臨身呻吟臥榻寄命於庸瞽之療治乞靈於冥漠之祈禱何如平時習片刻之勤免後日受諸般之苦今為就五官四體各有所宜按摩者列之為分行外功又取前人所定循序俾得周到者統之為合行外功分合雖殊按摩無異任人審擇而從事焉此固隨人隨地可行亦即時即刻見效愚年齒屆衰而體氣仍旺耳聽目視手持足行且有壯盛儕輩所弗及者誠得之於已信而有徵故不憚穎舌焦敝蘄以壽身者壽世願無負此婆心焉則幸矣分行外功訣心功一凡行功時先必冥心息思慮絶情欲以固守神氣身功一盤足坐時宜以一足跟抵住腎囊根下令精氣無漏一垂足平坐膝不可低腎子不可著在所坐處凡言平坐高坐皆坐於榻與椅上一凡行功畢起身宜緩緩舒放手足不可急起一凡坐宜平直其身豎起脊梁不可東倚西靠首功一兩手掩兩耳即以第二指壓中指上用第二指彈腦後兩骨作響聲謂之鳴天鼓治風池邪氣一兩手扭項左右反顧肩膊隨轉一兩手相叉抱項後面仰視使手與項爭力去肩痛目昏爭力者手著力要向前項著力要向後面功一用兩手掌相摩使熱隨向面上高低處揩之皆要周到再以口中津唾於手掌擦熱揩面上多次凡用兩手摩熱時宜閉口鼻氣摩之能令皺斑不生容顏光澤耳功一耳宜按抑左右多數謂以兩手按兩耳輪一上一下摩擦之所謂營治城郭使人聽徹一平坐伸一足屈一足橫伸兩手直豎兩掌向前若推門狀扭頭項左右顧各七次除耳鳴目功一每睡醒且勿開目用兩大指背相合擦熱揩目十四次仍閉住暗輪轉眼珠左右七次緊閉少時忽大睜開能保煉神光永無目疾一用兩大指背曲骨重按兩眉旁小穴三九二十七遍又以手摩兩目顴上及旋轉耳行三十遍又以手逆乘額從兩眉中間始以入腦後髮際中二十七遍仍須咽津無數治耳目能清明一用手按目之近鼻兩眥即眼角閉氣按之氣通即止常行之能洞觀一跪坐以兩手據地回頭用力視後面五次謂之虎視除胸臆風邪口功一凡行功時必閉口一口中焦乾口苦舌澀咽下無津或吞唾喉痛不能進食乃熱也宜大張口呵氣十數次鳴天鼓九次以舌攪口內咽津復呵復咽候口中清水生即熱退臟涼又或口中津液冷淡無味心中汪汪乃冷也宜吹氣溫之候口有味即冷退臟暖一每早口中微微呵出濁氣隨以鼻吸清氣咽之一凡睡時宜閉口使真元不出邪氣不入舌功一舌抵上顎津液自生再攪滿口鼓漱三十六次作三口吞之要汩汩有聲在喉謂之漱咽灌溉五臟可常行之齒功一叩齒三十六遍以集身神一凡小便時閉口緊咬牙齒除齒痛鼻功內經曰陽氣和利滿於心出於鼻故為噴嚏一兩手大指背擦熱揩鼻上三十六次能潤肺一視鼻端白數出入息一每晚覆身臥暫去枕從脖灣反豎兩足向上以鼻吸納清氣四回又以鼻出氣四回氣出極力後令微氣再入鼻中收納能除身熱背痛手功一兩手相叉虛空托天按頂二十四次除胸膈邪一兩手一直伸向前一屈回向後如挽五力弓狀除臂腋邪一兩手相捉為拳捶臂膊及腰腿又反手捶背上各三十六一兩手握固屈肘向後頓掣七次頸隨肘向左右扭治身上火丹疙瘩一兩手作拳用力左右各虛築七次除心胸風邪足功一正坐伸足低頭如禮拜狀以兩手用力扳足心十二次一高坐垂足將兩足跟相對扭向外復將兩足尖相對扭向內各二十四遍除兩腳風氣一盤坐以一手捉腳指以一手揩腳心湧泉穴濕風皆從此入至熱止後以腳指略動轉數次除濕氣健步一兩手向後據床跪坐一足將一足用力伸縮各七次左右交換治股膝腫一徐行手握固左足前踏左手擺向前右手擺向後右足前踏手右前左後除兩肩邪肩功一兩肩連手左右輪轉為轉轆轤各二十四次先左轉後右轉曰單轆轤左右同轉曰雙轆轤一調息神思以左手擦臍十四遍右手亦然復以兩手如數擦脅連肩擺搖七次咽氣納于丹田握固兩手屈足側臥能免夢遺背功一兩手據床縮身曲背拱脊向上十三舉除心肝邪腹功一兩手摩腹移行百步除食滯一閉息存想丹田火自下而上遍燒其體即十二段錦所行腰功一兩手握固拄兩脅肋擺搖兩肩二十四次除腰肋痛一兩手擦熱以鼻吸清氣徐徐從鼻放出用兩熱手擦精門即背下腰軟處腎功一用一手兜裹外腎兩子一手擦臍下丹田左右換手各八十一遍訣云一擦一兜左右換手九九之數真陽不走一臨睡時坐於床垂足解衣閉息舌抵上顎目視頂門提縮穀道如忍大便狀兩手摩擦兩腎腧穴各一百二十能生精固陽除腰疼稀小便以上分列各條隨人何處有患即擇何條行之或預防於無患之先者亦隨人擇取焉合行外功訣歌十二段錦歌閉目冥心坐握固靜思神叩齒三十六兩手抱崑崙左右鳴天鼓二十四度聞微擺撼天柱赤龍攪水津鼓漱三十六神水滿口勻一口分三咽龍行虎自奔閉氣搓手熱背摩後精門盡此一口氣想火燒臍輪左右轆轤轉兩腳放舒伸叉手雙虛托低頭攀足頻以候神水至再漱再吞津如此三度畢神水九次吞咽下汩汩響百脈自調勻河車搬運畢想發火燒身舊名八段錦子後午前行勤行無間斷萬病化為塵以上系通身合總行之要依次序不可缺不可亂先要記熟此歌再詳看後圖及每圖詳注各訣自無差錯十二段錦第一圖閉目冥心坐握固靜思神盤腿而坐緊閉兩目冥忘心中雜念凡坐要堅起脊梁腰不可軟弱身不可倚靠握固者握手牢固所以閉關卻邪也靜思者靜息思慮而存神也十二段錦第二圖叩齒三十六兩手抱崑崙上下牙齒相叩作響宜三十六聲叩齒以集身內之神使不散也崑崙即頭以兩手十指相叉抱住後項即用兩手掌緊掩耳門暗記鼻息九次微微呼吸不宜耳聞有聲十二段錦第三圖左右鳴天鼓二十四度聞記算鼻息出入各九次畢即放所叉之手移兩手掌掩耳以第二指迭在中指上作力放下第二指重彈腦後要如擊鼓之聲左右各二十四度兩手同彈一先一後共四十八聲仍收手握固十二段錦第四圖微擺撼天柱天柱即後頸低頭扭頸向左右側視肩亦隨頭左右搖擺各二十四次十二段錦第五圖赤龍攪水津鼓漱三十六神水滿口勻一口分三咽龍行虎自奔赤龍即舌以舌頂上顎又攪滿口內上下兩旁使水津自生鼓漱於口中三十六次神水即津液分作三次要汩汩有聲吞下心暗想目暗看所吞津液直送到臍下丹田龍即津虎即氣津下去氣自隨之十二段錦第六圖閉氣搓手熱背摩後精門以鼻吸氣閉之用兩掌相搓擦極熱急分兩手磨後腰上兩邊一面徐徐放氣從鼻出精門即後腰兩邊軟處以兩熱手磨三十六遍仍收手握固十二段錦第七圖盡此一口氣想火燒臍輪閉口鼻之氣以心暗想運心頭之火下燒丹田覺似有熱仍放氣從鼻出臍輪即臍下丹田十二段錦第八圖左右轆轤轉曲彎兩手先以左手連肩圓轉三十六次如絞車一般右手亦如之此單轉轆轤法十二段錦第九圖兩腳放舒伸叉手雙虛托放所盤兩腳平伸向前兩手指相叉反掌向上先安所叉之手於頭頂作力上托要如重石在手托上腰身俱著力上聳手托上一次又放下安手頭頂又托上共九次十二段錦第十圖低頭攀足頻以兩手向所伸兩腳底作力扳之頭低如禮拜狀十二次仍收手握固收足盤坐十二段錦第十一圖以候神水至再漱再吞律如此三度畢神水九次吞咽下汩汩響百脈自調勻再用舌攪口內以候神水滿口再鼓漱三十六連前一度此再二度乃共三度畢前一度作三次吞此二度作六次吞乃共九次吞如前咽下要汩汩響聲咽津三度百脈自周遍調勻十二段錦第十二圖河車搬運畢想發火燒身心想臍下丹田中似有熱氣如火閉氣如忍大便狀將熱氣運至穀道即大便處升上腰間背脊後頸腦後頭頂止又閉氣從額上兩太陽耳根前兩面頰降至喉下心窩肚臍下丹田止想似發火燒一身皆熱八段雜錦歌熱擦塗津美面容掌推頭擺耳無聾攀弓兩手全除戰捶打痠疼總不逢摩熱腳心能健步掣抽是免轉筋功拱背治風名虎視呵呼五臟病都空擦面美顏訣此訣無論每日早起及日間偶睡凡睡醒之時且慢開眼先將兩手大指背相合磨擦極熱隨左右手各揩左右眼皮上各九數仍閉目暗用眼珠輪轉向左九遍又向右九遍仍緊閉片時即大睜開明用眼珠向左右九轉大除風熱永無目疾隨後又將大指背磨擦極熱即以兩指背趁熱一上一下揩鼻上三十六遍能潤肺隨後又將兩大指背彎骨按兩眼外角邊小穴中各三十六遍又按兩眼之近鼻兩角之中如數大能明目洞視隨後合兩掌磨擦極熱即以熱掌自上而下順揩面上九十數要滿面高低處俱到再舔舌上津液於掌仍磨擦稍熱復擦面上九十次能光澤容顏不致黑皺此訣極簡易但於睡醒時稍遲下床便可行之起來覺神清氣爽即妙處也久行各效俱見六字治臟訣每日自子時以後午時以前靜坐叩齒咽津即依法念呵噓呼呬吹嘻六字以去五臟之病宜口中輕念耳不聞聲每念一字要盡一口氣久不可出字六字惟噓嘻易混噓字氣從唇出嘻字氣從舌出六字行功依式樣歌肝用噓時目睜睛念噓字要大睜兩目肺宜呬處手雙擎呬字要兩手如擎物心呵頂上連叉手念呵字要叉掌按頂腎吹抱取膝頭平吹字要兩手抱膝坐脾病呼時須嘬口念呼字要嘬口三焦有熱臥嘻寧嘻字要仰面身臥六字行功應時候歌春噓明目木扶肝夏日呵心火自閒秋呬定收金肺潤冬吹水旺坎宮安三焦長夏嘻除熱四季呼脾土化餐切忌出聲聞兩耳其功真勝保神丹六字行功各效驗歌噓屬肝兮外主目赤翳昏蒙淚如哭只因肝火上來攻噓而治之效最速呵屬心兮外主舌口中乾苦心煩熱量疾深淺以呵之喉舌口瘡並消滅呬屬肺兮外皮毛傷風咳嗽痰如膠鼻中流涕兼寒熱以呬治之醫不勞吹屬腎兮外主耳腰膝痠疼陽道痿微微吐氣以吹之不用求方需藥理呼屬脾兮主中土胸膛氣脹腹如鼓四肢滯悶腸瀉多呼而治之復如故嘻屬三焦治壅塞三焦通暢除積熱但須六次以嘻之此效常行容易得以上六字因疾行之疾愈即止某處有病以某字行之不必俱行恐傷無病之臟能依法行之實有奇效故醫書道經並載之修養宜行內功第二按摩導引之功既行之於外矣血脈俱已流暢肢體無不堅強再能調和氣息運而使之降於氣海升於泥丸則氣和而神靜水火有既濟之功所謂精根根而運轉氣默默而徘徊神混混而往來心澄澄而不動方是全修亦是真養其他玄門服氣之術非有真傳口授毫髮之差無益有損今擇其無損有益隨人隨時隨地皆可行者惟調息及黃河逆流二訣功簡而易效神而奇止在息心靜氣自堪卻疾延年爰以四語訣之曰氣是延生藥心為使氣神能從調息法便是永年人行內功圖內功正面圖內功背面圖內功訣此決每日子午二時先須心靜神閒盤足坐定寬解衣帶平直其身兩手握固閉目合口精專一念兩目內視叩齒三十六聲以舌抵上齶待津生時鼓漱滿口汩聲咽下以目內視直送臍下一寸二分丹田之中再以心想目視丹田之中倣佛如有熱氣輕輕如忍大便之狀將熱氣運至尾閭從尾閭升至腎間從夾脊雙關升至天柱從玉枕升至泥丸少停即以舌抵上齶復從神庭降下鵲橋重樓絳宮臍輪氣穴丹田修養宜寶精寶氣寶神第三高氏云吾人一身所恃精氣神具足足則形生失則形死故修養之術保全三者可以延年是以謂之三寶夫人一身一家之事應接無窮心役形勞不知稍節恃年力之壯任意不以為困何知衰憊之因死亡之速由此而致令人形槁體枯專求草根木葉之藥物以活吾命寧足恃哉故當於每日起居逐時戒謹乘間照常行動則身無過損而氣可日充精可日蓄神可日養疾可自此卻年可自此延矣總論精氣神精者滋於身者也氣者運於身者也神者主宰一身者也如耳目手足之能運者氣也使之因事而運者神也運之或健或倦者精也耳乃精竅目乃神竅口鼻乃氣竅故耳之閉塞精病可知目之昏蒙神病可知口之吼喘氣病可知元精乃先天真精非交媾之精元氣乃虛無空氣非呼吸之氣元神乃本來靈神非思慮之神所謂元精元氣元神由未生出胎以前而具俱先天也所謂交媾之精呼吸之氣思慮之神乃既生出胎之後而用俱後天也人身精實則氣充氣充則神旺此相因而永其生者也精虛則氣竭氣竭則神逝此相因而速其死者也孫思邈云怒甚偏傷氣思多太損神神疲精漸敝形弱病相縈太益曰存神可以固元氣令病不生若終日撓混則神馳於外氣散於內營衛昏亂衆疾相攻矣又曰神能使耳目手足視聽持行氣即隨而運之故寧神即養氣保精也人之身如國神如君君良則國治氣如民民聚則國強精如財財蓄則國富精人身液化為血血化為精精化為髓如飲食水穀入胃由脾磨化成液生血以充精故必借穀氣以培後天之精人乃得生也精者神倚之如魚倚水蓋魚借水養神借精滋也又精者氣托之如霧托淵蓋淵淺則霧薄精衰則氣弱也後天之精以至陰之液本於各臟之生化不過藏之於腎原非獨出於腎也無搖爾精乃可長生無搖者守之固也人肝精不固目眩無光肺精不固皮肉消瘦腎精不固神氣減散脾精不固齒髮衰白疾病隨生死亡將至哀哉心牽於事火動於中心火既動真精必搖參贊書曰人至中年以後陽氣漸弱覺陽事猶盛而常舉必慎而抑之不可縱情過度一度不泄一度火滅一度火滅一度添油若不強制則是膏火將殘更去其油故經語云急守精室勿妄泄閉而寶之可長活凡房室之事火隨欲起煽動精室雖不泄而精漸離位若將出而復忍之則精停蓄必化膿血成毒氣氣有稟於天地者有受於父母者稟天地之氣謂之真氣受父母之氣謂之凡氣真氣者人才成胎便稟天地之氣與人身之氣以類感類合化以成人身氣有清濁厚薄人因之有強弱剛柔凡氣者人初受形因父精母血蘊結而成胎自有溫暖之氣至十月氣足然後降生一點凡氣藏於下丹田氣穴一身之氣呼吸皆出於此先天元氣為陽氣後天穀氣為陰氣常使元氣內運陽氣若壯則陰氣自消陽壯陰衰百病不生簡菴曰人若貪睡則神離於氣氣無所主奔潰四溢食氣勝元氣者多肥故人肥甚者多不壽人借水穀之氣以養身水穀之清氣行於脈中者為營氣水穀之濁氣行於脈外者為衛氣營氣利關節衛氣充皮膚神神者人之未生父母媾精其兆始見一點初凝一念是也始見一點即所以成形初交一念即所以生神神為氣之子如有氣以成形乃有神之知覺運動指始有身而言也神為氣之帥如神行即氣行神住即氣住指既有身而言也神靜則心和神躁則心蕩心蕩則形傷欲全其形先在理神恬和養神以安於內清虛棲心不誘於外代疑編云身如屋神如主人主人亡則屋無與守曠而將傾矣身如舟神如舟子舟子去則舟不能行空而隨敝矣世人忙忙碌碌只奉養肉身而關係至重之神反撇卻不顧猶之舍舟子而操舟棄主人而奉屋豈不危哉昔康仲俊年八十六極強壯自言少時讀千字文即有所解悟謂心動神疲四字也平生遇事知謹節不久勞心疲神故老而不衰全神語彌格居士曰神者心之運用宜急治心以全神覺世真言曰通天達地出化入神只是一個心動中茫茫不知此心久不在腔子里故治心者要先知收心又曰心乃一身之主主人要時時在家一不在家則家人無管束必散亂矣故心不內守則氣自散神自亂精自耗覓玄語録云所謂思慮者亂想耳只是將已往未來之事終日牽念故知事未嘗纍人心乃人心自纍於事不肯放耳又曰世人終日營擾精神困憊夜間一睡一點靈明又為後天濁氣所掩安得復有澄定之時龍舒居士曰世人一生父母妻子屋宅田園牛羊車馬以至微細等物無非己之所有舉眼動步莫不顧戀且如紙窗雖微被人扯破猶有怒心一針雖小被人將去猶有吝意一宿在外已念其家一僕未歸已憂其失種種事物無不掛懷一旦大限到來盡皆拋棄雖我此身亦棄物也況身外者乎靜言思之恍然可悟一場幻夢呂涇野語曰人生順逆得失即盈虛消息之理乃造化所司非人所得而主之者然造化能苦我以境不能苦我之心是隻厄其半也若境苦而我心亦緣境俱苦謂之全厄明明厄可減半我自願受其全豈非癡漢虛齊語録曰仰觀宇宙之廣大俯察身世之微渺內視七情貪戀之虛想外睹六親眷屬之幻緣如一浮萍泛於巨海一漚泡消於大江此何庸著意安排倘昔自纏綿徒以困憊終其身此之謂人繭又曰世宙一大戲場離合悲歡要看假些功名富貴要看淡些顛連困苦要看平常些時勢熱鬧要看冷落些若認真當順境則心蕩氣揚當逆境則情傷魄喪到得鑼鼓一歇酒闌人散漏盡鐘鳴衆角色一齊下場那時誰苦誰樂覓玄語録云學治心者必須萬慮俱忘一心清靜問曰如何得心清曰誰令爾濁問曰如何得心靜曰誰令爾動凡人起一切事本由自心止一切事亦由自心如耳不聞非禮之聲聲自不擾汝耳目不視非禮之色色自不侵汝目作如是想自然清靜矣又問曰決烈之士於身心世事兩境界他能覷破用慧劍斬群魔自是入道大器下士為名利纏縛為嗜欲纏縛安能一旦了達解脫曰不怕念起惟怕覺遲覺來則念止此妙訣也每於一念妄生覺時急止之自此以一覺止一念久久純熟自然無念有覺心譬如鏡鏡常磨則塵垢不沾光彩常現只此覺止二字是入清靜境界的道路又曰治心者時時內觀此心即謂之覺一切煩邪亂想隨覺即除又曰觸事之心未能不動但須如谷應聲即應即止如鏡照物物來則照物去不留心傳曰將躁而止之以寧將邪而閒之以正將求而抑之以舍於此習久則物冥於外神安於內不求靜而心自靜矣又曰人居塵世難免營求雖有營求之事而無得失之心故有得無得心常安泰呂涇野語曰人心最苦處是此心沾滯縱自知得不能割斷故古有詔人歌曰夜結於夢晝馳於想起滅萬端盡屬虛妄一劍把持群魔消喪虛齊語録曰人生只忙迫一場苦惱至死豈不可哀詩云今此不樂逝者其耋苦惱者當自去尋樂一番蓋人固不可不知虛生之憂亦不可不知有生之樂不可不行步步求生之事尤不可不存時時可死之心宋白公曰煩惱乃伐命之斧斤人當於難制處用功古人有除煩惱歌云百年偶寄何苦煩惱天地缺陷人生皆有生初墜地哭聲一吼身落塵劫煩惱居首煩字從火內焚外燎臟腑焦燥形貌枯槁精因之搖神因之擾氣因之喪壽因之夭人固明知煩惱自討氣性之偏習而難矯執迷者多醒悟者少古有歌詞名曰寶誥當煩惱時心鏡內照譬如此身冥冥杳杳墜地以前歸土以後此身都無煩惱盡掃持誦斯言永年可保吾聞多憂者見理之不明也否則安命之不固也不然何不學君子之蕩蕩反同小人之戚戚又聞多憂者其思結氣將沮也其氣沮神將索也多陰而少陽將從陰而下沉不能從陽而上升也此近死之兆有一樂境界便有一苦境界相對待有一得意事便有一失意事相乘除猶晝夜寒暑之循環無偏倚也故知履盛滿者不必喜知必有困厄之時履困厄者不必憂知必有亨通之日宜遠觀百年之興廢無近拘一日之榮枯欲知其實但當看人家高曾祖父與其子孫通計較量則有盛必有衰有衰必有盛循環對待之理顯然在目前矣人生世間自幼至壯至老如意之事常少不如意之事常多雖大富貴人天下之所仰羡以為神仙而其不如意事各自有之與貧賤者無異特所憂患之事異耳從無有足心滿意者故謂之缺陷世界能達此理而順受之則雖處患難中無異於樂境矣人謂貧賤不如富貴耶積貯愈厚計慮愈深勞苦愈甚第宅園田為子計又為孫計致使飲膳失期夜分莫寢貧賤者無是苦也孰謂貧賤不如富貴也為卑官則恨不享大位及位高而險禍叵測回想卑官而受安穩之福真仙境矣布衣糲食舉家安泰惟恨不富及至金多而經營勞困驚惶憂恐回想貧窮無事時一家安泰真仙境矣身體強健則恨欲不稱心一朝疾病淹纏臥床寢席百般痛苦回想四體康強時真仙境矣無奈人只見一層不見二層也一字安心之要修養宜知要知忌知傷第四子輿氏曰夫蚓上食稿壤下飲黃泉東坡曰蝸涎不滿殼聊足以自濡所謂知要也又野語曰蝮蛇有一種小而甚智巫流操其法術欲取之必誦咒語於洞穴之口蝮一聞之即以尾塞其耳拒其聲而弗聽巫術窮而蝮得安於蜇所謂知忌也又曰夜飛之蛾赴燈燭光而撲之始以為快卒以焚身蚊睫朗於暗避火而遠揚焉所謂知傷也夫人靈於物終其身昧昧然不知所謂有要有忌有傷者或致枯於貪或罹患於誘或焚身於快豫為就日之所習最要最忌最傷之事臚列而瑣陳之使由是推類引伸以保其生庶幾不智出微蟲下也十要面要常擦如前擦面之功能使容顏光澤故要常擦道家謂之修神庭目要常揩每靜時能常閉目用兩大指背兩相磨擦揩眼使去火永無目疾故要常揩耳要常彈即鳴天鼓可免耳患故要常彈齒要常叩齒喜動故要常叩背要常暖肺系近背暖則不受風寒故要常暖胸要常護胸即心窩故要常護腹要常摩歌云食後徐行百步多手摩臍腹食消磨故要常摩足要常搓如前足功搓腳底湧泉穴能去風濕健步履故要常搓津要常咽如前舌功常取津液滿口汩聲咽之能宣通百脈故要常咽睡要常曲仰面伸足睡恐失精故宜側曲又曰睡則氣滯於百節養生家睡宜縮覺宜伸十忌忌早起科頭早多風露之氣科頭則寒邪入腦故忌之忌陰室貪涼無陽照之室陰氣重傷人故忌之忌濕地久坐潮濕氣主生瘡毒故忌之忌冷著汗衣汗衣濕後必冷著之則侵背傷肺故忌之忌熱著曬衣久曬之衣有熱毒未經退熱即著在身必受毒故忌之忌出汗扇風汗出時毛竅俱開扇則風邪侵入故忌之忌燈燭照睡神不安故忌之忌子時房事陽初生而頓滅一度勝十度故忌之忌夏月涼水抹簟冬月熱火烘衣冷水受濕熱火受毒取快一時久必生病故忌之忌久觀場演劇久視久聽則神與精俱傷故忌之十八傷久視傷精目得血能視精由血化故傷精久聽傷神神滋於腎腎通竅於耳故傷神久臥傷氣臥時張口散氣合口壅氣故傷氣混元經曰睡則氣滯於百節覺與陽合寐與陰並覺多則魂強寐久則魄壯魂強者生之人魄壯者死之徒也久坐傷脈脈宜運動坐則不舒展故傷脈久立傷骨立以骨幹為用故傷骨久行傷筋行以筋力為用故傷筋暴怒傷肝肝屬木怒如暴風動搖故傷肝又肝主血肝傷則血不榮必筋痿思慮傷脾思慮時脾必運動太過則脾倦故傷脾極憂傷心心屬火於味主苦憂則苦甚故傷心過悲傷肺肺屬金主聲音悲苦久則聲啞故傷肺過飽傷胃飽食運化難消故傷胃多恐傷腎腎屬水主北方黑色人受驚恐則面黑故傷腎多笑傷腰笑時必腎轉牽腰動故傷腰多言傷液言多則口焦舌苦故傷液多唾傷津津生於華池散為潤澤灌溉百脈唾則損失故傷津又訓典曰津不吐有則含以咽之使人精氣留而自光多汗傷陽汗多亡陽陽隨汗出故傷陽多淚傷血血藏於肝哭泣多則肝損目枯故傷血多交傷髓人之陽物百脈貫通及欲火動而行事撮一身血髓至於命門化精以泄不知節欲致骨髓枯竭真陽無寄如魚之失水以死修養宜四時調理第五延壽之法惟自護其身而已冬溫夏涼不失時序即所以自護其身也故前人云知攝生者臥起有四時之早晚興居有至和之常制調養筋骨有偃仰之方節宣勞逸有豫奪之要溫涼合度居處無犯於八邪則身自安矣真西山先生四時調理春月歌云嘗聞避風如避箭春風多厲須防患況因陽發毛孔開風才一入成癱瘓夏月歌云四時惟夏難調理陽神在外陰在裡心旺腎衰何所防特忌貪歡泄精氣秋月歌云時到秋來多瘧痢浣漱沐浴宜暖水瓜茄生菜不宜餐臥冷枕涼皆勿喜冬月歌云伏陽在內三冬月切忌汗多陽氣泄陰霧之中勿遠行凍雪嚴霜宜早歇春夏秋冬歷一年稍知調護自無愆安然無病稱真福莫恃身當壯盛年細玩五歌語雖淺而法實周欲護其身者故當書紳三復春三月攝生消息論曰春陽初升萬物發萌人有宿疾春氣攻動又兼去冬以來擁爐薰衣積至春月因而發泄致體熱頭昏四肢倦怠腰腳無力皆冬所蓄之疾是務調理調理法勿多食酸味減酸以養脾氣春肝木正旺酸味屬木脾屬土恐酸味助木剋土令脾受病宜常食新韭大益人過春後勿食多昏神飲屠蘇酒於元旦免一年疾患酒方大黃一錢川椒一錢五分桂心一錢八分烏頭炮六分白朮一錢八分茱萸一錢一分桔梗一錢五分防風一兩元旦寅時酒煎飲之宜先幼後長乍寒乍暖不可頓去綿衣漸漸減之稍寒莫強忍即仍加服春夜臥時間或用熱水下鹽一撮洗膝下至足方臥能泄風邪腳氣三月三日上巳節宜臨水宴飲修禊事以祓除不祥夏三月保生心鑑曰暑氣酷烈煉石流金於外心火焚熾於內古人於是時獨宿淡味節嗜欲定心息氣兢兢業業保身養生諺云度過七月半便是鐵石漢因一歲惟夏乃生死關也試看草枯木落其汁液盡消竭於夏危乎危乎其此時乎調理法勿多食苦味減苦以養肺氣夏心火正旺苦味屬火肺屬金恐苦味助火剋金令肺受病雖大熱勿食凍水冷粉冷粥等物雖取快一時冷熱相搏多致腹疾勿食煎炒炙煿等物以助熱毒多發癰疽勿枕冷石損目勿睡熟扇風或露臥取涼多成風痹癱瘓之病陰房破窗防賊風中人最暴勿用冷井水洗面伏熱在身烈日曬熱之衣不可便穿宜每日早起以受清明之氣五月五日用枸杞煎水沐浴可卻除災疾又是日午時可合平安散存用凡五月五日午時宜修合藥餌者因斗柄決以月月常加戌戌時天罡指午亥時指未自未輪轉五日午時正指艮宮為塞鬼戶也故用此時合藥最效平安散方雄黃火硝明礬硃砂各二錢冰片麝香各三分蓽茇五釐真金三十張共研為末防疫氣流行用貫仲一味置廚房水缸內閣家食之不染調烏梅湯解暑方用烏梅不拘多少搗爛加蜜調滾水待溫飲之或用砂糖代蜜亦可秋三月養生論曰秋風雖爽時主肅殺萬物於此凋傷順時調攝使志安寧以緩秋刑此秋氣之應養收之道也調理法勿多食辛味減辛以養肝氣秋肺金正旺辛味屬金肝屬木恐辛味助金剋木令肝受病勿食生冷以防痢疾勿食新姜大熱損目勿貪取新涼凡人五臟俞穴皆會於背酷熱之後貪取風涼此中風之源也故背宜常暖護之八月一日用絹展取百草頭上露拭兩目倍光明柏樹露尤妙九月九日佩茱萸飲菊花酒卻疾益人冬三月律志曰北方陰也伏也陽伏於下於時為冬當閉精養神以厚斂藏如植物培護於冬至來春方得榮茂此時若戕賊之春升之際下無根本枯悴必矣調理法勿多食鹹味減咸以養心氣冬腎水正旺咸屬水心屬火恐鹹味助水剋火令心受病不宜多出汗恐泄陽氣勿多食蔥亦恐發散陽氣不宜沐浴陽氣在內熱水逼而出汗汗出而毛孔開最易感寒冬傷於寒春必病瘟不宜早出犯霜或略飲酒以沖寒氣不宜犯賊邪之風冬月東南風為賊邪風宜謹避之冬至日用赤小豆煮粥合宅啜之可免瘟疫時症宜積貯雪水烹茶飲之能解一切熱毒修養宜飲食調理第六飲食男女人之大欲存焉即人之死生系焉舉世之人皆知男女之事縱欲必致傷生即飲食之中亦惟知縱酒過度必至戕命至於嗜味縱口疾病叢蓄甘陷溺於其中而不知警蓋病之生也其機甚微由積漸而毒始發及病之成也第歸咎於外感六氣內傷七情鮮有悔悟於平日口腹之貪叨者考之內經曰飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布諸經並行是為無病之人此言水穀之益人也今也飲食不節恣食厚味惟恐不及血沸氣騰濟以燥毒清化為濁脈道阻澀不能自行疾已潛滋矣猶恬不知畏雖曉之以物性陳說利害無如美食在前馨氣當鼻饞涎莫遏其可禁乎或反託詞腸胃堅厚福氣深壯何妨奉養縱口固快一時積久必為災害前哲格言爽口作疾厚味厝毒謂之何也或者疑內經曰精不足者補之以味又曰地食人以五味則嗜味何傷不知味有本於天者有成於人者谷粟菽麥自然沖和之味有益人補陰之功此內經所為本天之味也若人之所為者皆烹飪偏厚之味有致疾傷命之虞安於沖和之味者心之斂火之降也以偏厚之味為安者欲之縱火之勝也且穀食與肥鮮同進厚味得谷為助其積之也久寧不長陰火而致虐乎彼安於厚味者未之思耳昔人飲食垂戒針曰山野貧賤淡薄為常動作不衰體健而康均此同體我獨苦病悔悟一萌塵開鏡淨可知茹淡者安啖厚者危試觀古今來壽登百歲以上者多出於民間而身都通顯家享豐厚者罕有其人豈天命定數獨彼壽而此否乎又或者曰視養我者均為我賊食物固可廢歟曰厚不如薄多不如少慮患而謹節之畏危而堅忍之舉匕箸如警戈矛不與肉食者同其陷溺寧負我生之腹不負生我之天是亦衛生之一道也嗜味縱口必致傷生已淳淳戒之矣即日用蔬菜之屬各有性寒性熱之不同或益或損之宜辨苟非平時留神審擇亦陰受其患而不知茲復就家常需用之食物搜考本草諸書而摘録之憚知所去取而慎擇焉按本草諸書坊間舊刻不下數十種究無一可據或性味彼此柄鑿或損益自相矛盾甚或侈陳反忌竟無一物敢入口者姑舉其一二言之如食品諸物載雞肉同蝦鯉魚食成癰芥菜同鯉魚食成心瘕凡肴饌中多以此合食曾未見有為害者且又謂鴨肉與鱉同食殺人尤屬妄誕駭人耳目至如一物也言主治則云能化痰能益氣言反忌又云食之生痰動氣將信為化痰益氣而食之乎抑信為生痰動氣而禁之乎令人無所適從何須費辭饒舌惟延禧堂集解頗能闢之謂諸家食忌不可盡信然亦以豬之臨宰驚氣入心絶氣入肝皆不可食等語信為有據敘入篇中獨不思心之與肝凡畜同具屠宰之時皆不驚不絶乎何僅一豬為然且既云心不可食矣何又云心可入心補心既云肝不可食矣何又云肝能入肝明目荒唐無稽之說不可殫述茲則刪其繁蕪正其悖謬就常食習見之物分類而剖之確而可信簡而易稽俾飲之食之者洞悉其物性審擇其損益庶有助於養生者之趨避也穀類粳米性和平得天地中和之氣又稱黏米南産米勝於麥北産麥勝於米亦地氣使然也宜陳米性平扶助脾土益精強志滋培胃氣忌新米性稍熱凝痰早米性溫得土氣最能健脾晚米性涼得金氣尤能解熱紅米性溫力厚白米性涼氣清糯米性溫米之綿軟者宜補脾肺虛冷堅大便實腸忌多食黏滯難化糯米釀酒和以極克伐之藥曲糟秕仍難融化即此可知粟米性微寒小米曰粟米糯者名秫釀與糯米同宜養腎益氣解胃熱利二便忌濕熱下痢者少食大麥性溫宜助胃補脾下氣除脹忌久食生熟亦令腳軟因其下氣也麥芽性微熱味甘化一切面食積滯小麥性微寒北産與陳久者良宜養心補氣助五臟厚腸胃面性熱麥之涼在皮面去皮即性熱加鹼水者多口燥發渴麩性涼尉腰腳寒濕散血止痛蕎麥性寒宜降氣寬腸解酒積忌脾胃虛者勿多食致頭眩高粱即稷宜作酒治腹疾良芝麻性平即胡麻又名巨勝子陶弘景曰八谷中惟此最良宜補脾益肝腎潤五臟填精髓堅筋骨明耳目涼血解毒黑者入腎白者入肺粟色者久蒸久曬可以耐飢薏苡仁性微寒宜健脾補肺除腳氣濕熱去筋疼拘攣亦治疝氣熱淋祛邪輔正有益無損最宜常作粥食緑豆性涼去皮性平宜清熱解毒利小便消腫痛忌多食動腹中冷氣豆粉性涼蕩粉皮索粉條皆能醒酒解毒豆芽同粉黃豆性平炒則熱煮則寒作豉則冷蒸曬則溫宜清熱下大腸濁氣忌發瘡助膿豆腐性寒和脾胃消脹豆腐漿清火帶補豆腐皮性寒解熱除斑豆腐乾性同豆腐豆腐乳性同黑豆性寒堅小者名馬料豆宜鎮心活血明目補腎利水下氣散熱驅風解毒豆豉性冷發汗解肌調中下氣蠶豆性溫即胡豆宜快胃利臟忌多食發脹豌豆性平宜益胃止泄忌多食發脹赤小豆性平宜補心忌多食助熱獸類豬肉性微寒雄豬曰豭騸割者曰豶母豬曰彘宜肉補肉豐肌體澤皮膚亦潤腸胃生精液忌多食助熱生痰動風故肉雖多不使勝食氣也風寒病初起及愈後宜暫禁之因油膩沾滯風寒不能解散又病後腸胃虛弱難受肥濃也豬頭性熱有毒發宿疾槽頭毒比豬頭尤甚系豬項肉腦髓性大寒冷精損陽豬舌無毒可食豬蹄性平煮湯食通乳汁洗敗瘡良豬血性平解丹石毒治頭風眩暈心血治驚癲尾血和冰片治痘瘡倒黶多食損陽豬油性寒涼血潤燥散風利腸解毒殺蟲胰子油潤五臟消干脹豬心性平治驚邪虛悸補心血不足豬肝性溫補肝明目豬肺性微寒補肺治咳豬肚性溫健脾補羸助氣四季宜食豬腸性寒潤腸治燥止小便調血痢豬腎即腰子性冷治腎虛腰疼耳聾豬脾即連貼性平治脾胃虛熱豬脊髓性寒補骨髓益虛勞羊肉性熱宜補虛勞益氣血壯陽開胃忌發瘡癤羊肝性平補肝明目羊膽性苦寒點風淚眼赤障白翳良脛骨燒灰擦牙良羊血性涼解金銀丹石砒硫毒羊乳性甘溫補肺腎虛潤胃脘大腸治反胃消渴口瘡舌腫牛肉性溫味甘補脾宜補脾益氣壯力強筋忌患瘡毒者勿食肉患冷痢者勿